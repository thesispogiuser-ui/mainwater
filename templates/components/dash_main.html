<section id="dashMain" class="page active">

  <!-- Hidden: alert + leak elements for JS compatibility -->
  <div id="alertBox" class="alert-bar hidden" style="display:none !important;">
    <div class="alert-bar-text"></div>
    <button class="btn-ai-recommend" onclick="openAIRecommendModal()"></button>
  </div>

  <!-- KPI Row -->
  <div class="kpi-row" style="margin-bottom:10px;grid-template-columns:1fr 1fr;">
    <div class="kpi-card kpi-card-blue">
      <div class="kpi-card-top"><div class="kpi-label">Today's Usage</div><div class="kpi-icon">💧</div></div>
      <div class="kpi-value" id="dailyConsumption">0.000 m³</div>
      <div class="kpi-sub" id="dailyLiters">0 L today</div>
    </div>
    <div class="kpi-card kpi-card-gold">
      <div class="kpi-card-top"><div class="kpi-label">Total This Month</div><div class="kpi-icon">📆</div></div>
      <div class="kpi-value" id="totalConsumption">0.000 m³</div>
      <div class="kpi-sub" id="percentageChange">—</div>
    </div>
  </div>

  <!-- Hidden: billing IDs for JS compatibility -->
  <div style="display:none;"><span id="estimatedBill"></span></div>

  <style>
    /* ── Meter hero layout ── */
    .meter-hero {
      display: grid;
      grid-template-columns: 180px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 8px 0;
    }
    @media(max-width:1100px) {
      .meter-hero { grid-template-columns: 1fr; justify-items: center; }
      .meter-reco-panel, .meter-info, .meter-capture-col { max-width: 100%; width: 100%; }
    }

    /* ── AI reco panel (left) ── */
    .meter-reco-panel { display:flex; flex-direction:column; gap:0; align-self:start; }
    .meter-reco-panel h3 { font-size:11px; font-family:var(--font-mono); color:var(--cyan); margin:0 0 6px; letter-spacing:.5px; }
    .reco-ai-item { padding:7px 10px; font-size:10px; color:var(--text-dim); font-family:var(--font-mono); border-left:3px solid var(--cyan); background:var(--bg); border-radius:0 6px 6px 0; margin-bottom:4px; line-height:1.4; }
    .reco-ai-item.warn { border-left-color:var(--gold); background:var(--gold-dim); }
    .reco-ai-item.ok   { border-left-color:var(--green); background:var(--green-dim); }
    .reco-ai-loading   { text-align:center; color:var(--text-muted); font-size:10px; padding:12px 0; font-family:var(--font-mono); }

    /* ── Meter ring (center) ── */
    .meter-ring-wrap { display:flex; align-items:center; justify-content:center; }
    .meter-ring-outer {
      position:relative; width:290px; height:290px; border-radius:50%;
      background:conic-gradient(from 220deg,rgba(56,189,248,0.15),rgba(56,189,248,0.03) 40%,rgba(74,222,128,0.06) 70%,rgba(56,189,248,0.1));
      box-shadow:0 4px 20px rgba(0,0,0,0.15);
      display:flex; align-items:center; justify-content:center;
    }
    .meter-ring-outer::before { content:''; position:absolute; inset:4px; border-radius:50%; border:2px solid rgba(56,189,248,0.12); pointer-events:none; }
    .meter-ring-outer::after  { content:''; position:absolute; inset:10px; border-radius:50%; border:1px solid rgba(56,189,248,0.06); pointer-events:none; }
    .meter-ring-inner {
      width:258px; height:258px; border-radius:50%; overflow:hidden; position:relative;
      border:2px solid rgba(56,189,248,0.2); box-shadow:inset 0 0 16px rgba(0,0,0,0.1); background:var(--bg);
    }
    .meter-ring-inner img { width:100%; height:100%; object-fit:cover; display:block; transition:opacity .3s; }
    .meter-ring-inner .ph {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      flex-direction:column; color:var(--text-muted); font-size:11px; text-align:center;
      padding:16px; font-family:var(--font-mono);
    }
    .meter-badge {
      position:absolute; bottom:14px; left:50%; transform:translateX(-50%); z-index:2;
      background:rgba(26,35,50,0.92); border:1.5px solid rgba(56,189,248,0.25);
      border-radius:18px; padding:5px 16px; backdrop-filter:blur(10px);
      box-shadow:0 3px 10px rgba(0,0,0,0.15); white-space:nowrap;
      display:flex; align-items:center; gap:5px;
    }
    .meter-badge-val  { font-family:var(--font-mono); font-size:18px; font-weight:800; color:var(--cyan); letter-spacing:1px; }
    .meter-badge-unit { font-size:10px; color:var(--text-muted); font-weight:600; }
    .meter-cd { position:absolute; top:10px; right:10px; display:flex; align-items:center; gap:3px; z-index:2; }
    @keyframes ring-glow { 0%,100%{box-shadow:0 4px 20px rgba(56,189,248,0.08);}50%{box-shadow:0 4px 28px rgba(56,189,248,0.18);} }
    .meter-ring-outer.live { animation:ring-glow 3s ease-in-out infinite; }
    @media(max-width:900px) { .meter-ring-outer{width:240px;height:240px;} .meter-ring-inner{width:210px;height:210px;} }

    /* ── Right column: info + capture button ── */
    .meter-capture-col {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-self: center;
      min-width: 200px;
    }
    .mi-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:9px 12px; background:var(--card); border:1px solid var(--card-border); border-radius:7px;
    }
    .mi-label { font-size:9px; color:var(--text-muted); font-family:var(--font-mono); text-transform:uppercase; letter-spacing:.4px; }
    .mi-val   { font-family:var(--font-mono); font-weight:700; font-size:11px; }
    .status-dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:4px; }

    /* ── Manual Capture button — sits naturally in the right col ── */
    .capture-btn-main {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 11px 14px;
      background: rgba(56,189,248,0.10);
      border: 1.5px solid rgba(56,189,248,0.30);
      border-radius: 9px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font-mono);
      cursor: pointer;
      transition: all .18s;
      width: 100%;
      margin-top: 4px;
      letter-spacing: .03em;
    }
    .capture-btn-main:hover:not(:disabled) {
      background: rgba(56,189,248,0.20);
      border-color: rgba(56,189,248,0.55);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(56,189,248,0.15);
    }
    .capture-btn-main:active { transform:translateY(0); }
    .capture-btn-main:disabled { opacity:.45; cursor:not-allowed; }
    .capture-btn-main .cb-icon { font-size:16px; }

    /* ── Last capture info under button ── */
    .capture-ts-row {
      display:flex; align-items:center; gap:5px;
      padding:6px 10px; background:var(--bg); border-radius:6px;
      border:1px solid var(--card-border);
    }
  </style>

  <div class="cam-card" style="margin-bottom:10px;padding:12px;">
    <div class="meter-hero">

      <!-- LEFT: AI Recommendations -->
      <div class="meter-reco-panel" id="dashRecoPanel">
        <h3>🤖 AI Assistant</h3>
        <div id="dashRecoContent"><div class="reco-ai-loading">⏳ Checking…</div></div>
      </div>

      <!-- CENTER: Meter ring — fully unobstructed -->
      <div class="meter-ring-wrap">
        <div class="meter-ring-outer live" id="submeter3dRing">
          <div class="meter-ring-inner">
            <img id="captureImg" alt="Meter" style="display:none;"/>
            <div id="capturePlaceholder" class="ph">
              📷 Connecting…<br>
              <span style="font-size:10px;opacity:.6;">Auto every 60 min</span>
            </div>
          </div>
          <div class="meter-badge">
            <span class="meter-badge-val" id="meterReadingDisplay">—</span>
            <span class="meter-badge-unit">m³</span>
          </div>
          <div class="meter-cd" id="captureCountdown">
            <div class="countdown-ring">
              <svg width="18" height="18" viewBox="0 0 28 28">
                <circle cx="14" cy="14" r="12"/>
                <circle cx="14" cy="14" r="12" class="progress" id="countdownRing"/>
              </svg>
            </div>
            <span style="font-size:9px;color:var(--text-muted);font-family:var(--font-mono);"><span id="countdownNum">—</span></span>
          </div>
        </div>
      </div>

      <!-- RIGHT: Status info + Manual Capture button -->
      <div class="meter-capture-col">
        <div class="mi-row">
          <span class="mi-label">Status</span>
          <span class="mi-val" id="deviceStatusDisplay" style="color:var(--cyan);">
            <span class="status-dot" style="color:var(--cyan);background:var(--cyan);"></span>Connecting…
          </span>
        </div>
        <div class="mi-row">
          <span class="mi-label">Meter Reading</span>
          <span class="mi-val" id="aiEdgeLastValue" style="color:var(--green);font-size:14px;">—</span>
        </div>
        <div class="mi-row">
          <span class="mi-label">Last Capture</span>
          <span class="mi-val" style="color:var(--text-muted);font-size:9px;">
            <span id="captureTimestamp">—</span>
          </span>
        </div>
        <div class="mi-row">
          <span class="mi-label">Updated</span>
          <span class="mi-val" id="aiEdgeTimestamp" style="color:var(--text-muted);font-size:9px;">—</span>
        </div>
        <div class="capture-ts-row" style="font-size:9px;color:var(--text-muted);font-family:var(--font-mono);">
          <span class="ocr-badge" id="captureOcrBadge" style="display:none;font-size:9px;"></span>
          <span id="captureOcrFallback" style="opacity:.6;">OCR status will appear here</span>
        </div>

        <!-- ★ Manual Capture button — right side of meter, fully visible ★ -->
        <button class="capture-btn-main" id="manualCaptureBtn" onclick="manualCapture(this)">
          <span class="cb-icon">📷</span> Manual Capture
        </button>
      </div>

    </div>
  </div>

  <!-- Hidden elements for JS compatibility -->
  <div style="display:none;"><span id="aiEdgeRate">—</span><span id="aiEdgeFlowStatus">—</span></div>
  <div id="adminEdgeControls" style="display:none !important;"><div id="aiEdgeStatusCard"></div><div id="aiEdgeError">—</div></div>
  <div style="display:none;" id="cameraWrapperA"><img id="esp32StreamA" crossorigin="anonymous"/><p id="camOfflineMsgA"></p></div>
  <div style="display:none;" id="cameraWrapperB"><img id="esp32StreamB" crossorigin="anonymous"/><p id="camOfflineMsgB"></p></div>
  <div style="display:none;" id="ocrValueDisplayA"></div><div style="display:none;" id="ocrValueDisplayB"></div>
  <span style="display:none;" id="camStatusA"></span><span style="display:none;" id="camStatusB"></span>
  <button style="display:none;" id="camConnectBtnA"></button><button style="display:none;" id="camStopBtnA"></button>
  <button style="display:none;" id="camConnectBtnB"></button><button style="display:none;" id="camStopBtnB"></button>
  <div style="display:none;" id="camActiveLabel"></div>

  <div class="section-header"><div class="section-title">Live Consumption</div></div>
  <div style="margin-bottom:10px;">
    <div class="chart-card">
      <div class="chart-card-head"><div class="chart-card-title">📈 Consumption (m³)</div><div class="chart-card-badge">Real-time</div></div>
      <canvas id="consumptionChart" height="100"></canvas>
    </div>
  </div>

  <!-- Hidden: leak chart for JS compatibility -->
  <div style="display:none;"><canvas id="leakChart"></canvas></div>
</section>
